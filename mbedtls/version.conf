# mbedTLS release pin for oscam
#
# This config file is the single source of truth for the mbedTLS version
# oscam builds against. The build system (config.sh --mbedtls-fetch) reads
# it, downloads the official release tarball into .mbedtls-cache/, verifies
# the SHA256 and extracts the tarball here into mbedtls/.
#
# To bump the version, edit VERSION (and SHA256). The URL template uses
# ${VERSION} so it adapts automatically. No shell/Makefile/CMake changes
# are needed for a version bump.

VERSION=4.1.0
URL="https://github.com/Mbed-TLS/mbedtls/releases/download/mbedtls-${VERSION}/mbedtls-${VERSION}.tar.bz2"
SHA256=377a09cf8eb81b5fb2707045e5522d5489d3309fed5006c9874e60558fc81d10
